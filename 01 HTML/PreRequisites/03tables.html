<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
  </head>
  <body>
    <h1>Here we learn about tables</h1>
    <h2>Let's Go......</h2>

    <table border="2">

      <caption>
        Fodd Items
      </caption>

      <colgroup>
        <col style="background-color: aqua" />
        <col style="background-color: bisque" />
        <col style="background-color: lightgreen" />
      </colgroup>

      <thead>
        <tr>
          <th>Name</th>
          <th>Quantity</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Maggie</td>
          <td>5</td>
          <td>15</td>
        </tr>
        <tr>
          <td>Biscuit</td>
          <td>10</td>
          <td>5</td>
        </tr>
        <tr>
          <td>Pasta</td>
          <td>15</td>
          <td>10</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <th colspan="2">Total</th>
          <th>150</th>
        </tr>
      </tfoot>
      
    </table>
  </body>
</html>
