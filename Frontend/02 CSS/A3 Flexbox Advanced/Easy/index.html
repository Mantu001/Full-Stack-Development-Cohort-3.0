<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- this is font awesome cdn link Mandatory -->
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <main>
        <h1 class="bg-squid" >SQUID</h1>
        <h1 class="bg-game" >GAME</h1>
        <nav class="navbar">
            <img class="logo" src="./Images/logo.png" alt="logo">
            <ul class="nav-link">
                <li>About</li>
                <li id="hover">Watch now</li>
                <li>Actors</li>
                <li>Contact</li>
            </ul>
            <div class="menu">
                <i class="ri-menu-line"></i>
            </div>
        </nav>
        <section class="hero-section">
            <div class="left">
                <img class="hero-logo" src="./Images/logo.png" alt="">
                <p class="hero-text">Action / Thriller / Drama Series Directed by Dong-hyuk Hwang <br>Season 1: 9 Episodes</p>
                <div class="hero-btn">
                    <button id="active" class="btn" ><i class="ri-play-large-fill"></i> Play Now</button>
                    <button class="btn" ><i class="ri-play-large-fill"></i> Watch Trailer</button>
                </div>
            </div>
            <div class="right">
                <div class="scroll-text">
                    <div class="line"></div>
                    <span>SCROLL</span>
                </div>
                <img class="hero-img" src="./Images/charactor.png" alt="">
                <div class="hero-icon">
                    <i class="ri-twitter-line"></i>
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-fill"></i>
                </div>
            </div>
        </section>
        <section class="card-section">
            <div class="card">
                <img class="card-1" src="./Images/card 1.png" alt="">
                <div class="play-btn1"><i class="ri-play-large-fill"></i></div>
            </div>
            <div class="card">
                <img class="card-2" src="./Images/card 2.jpg" alt="">
                <div class="play-btn2"><i class="ri-play-large-fill"></i></div>
            </div>
            <div class="card">
                <img class="card-3" src="./Images/card 3.png" alt="">
                <div class="play-btn3"><i class="ri-play-large-fill"></i></div>
            </div>
            
        </section>
    </main>
</body>
</html>
