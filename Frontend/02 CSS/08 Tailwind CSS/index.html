<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- chalawa element -->
     <div class="ab">
         <h1>My name is</h1>
     </div>

     <div class="box"></div>

     <!-- Unerline Animation -->
     <nav class="nav-bar">
        <h4>Home</h4>
        <h4>Courses</h4>
        <h4>Sections</h4>
        <h4>About</h4>
     </nav>

     <!-- button animation -->
      <div class="anime">
          <button class="btn-1">Download</button>
          <button class="btn-2">See More</button>
      </div>

      <!-- CSS Variable -->
       <div class="variable">
            <h1>Hello This is CSS Variable </h1>
            <p><span>Css</span> Variable is used to create a custum property</p>
            <button class="yes">Yes</button>
            <button class="no">No</button>
       </div><br><br>

       <!-- Tailwind CSS -->
        <!-- 
            Notes:-
            1. it is a predefined class
            2. no need to create style.css file
            3. used to implement on class in html
            4. just insert CDN (content delevery network) file from tailwind css website and boom now start work
        -->
        <div class="tailwind">
            <!-- for responsive -->
            <h1 class="text-3xl h-50 w-100% bg:red-700 sm:bg-blue-400 md:bg-red-300 lg:bg-green-400 flex items-center justify-center animation-spin ">This is Tailwind CSS</h1>
            <!-- for animation -->
            <div class="tail-box h-50 w-50 bg-blue-300 animate-spi flex items-center justify-center rounded-[50%] animate-spi ">
                <h1 class="text-5xl ">M</h1>
            </div>
        </div>

        <!-- Clip path -bennetfelly  -->
        <div class="clip-path"></div>

        <!-- Designing Car -->
         <div class="car">
            <div class="upper-body"></div>
            <div class="wheel">
                <div class="front animate-spin"><h1 class="car-logo">R</h1></div>
                <div class="back animate-spin"><h1 class="car-logo">R</h1></div>
            </div>
         </div>
</body>
</html>
