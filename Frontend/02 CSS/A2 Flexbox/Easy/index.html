<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav">
        <img id="logo" src="./Assets/Logo.webp" alt="ScaleX logo">
        <div class="options">
            <h4>Home</h4>
            <h4>About us</h4>
            <h4>Blogs</h4>
            <h4>Contact Us</h4>
        </div>
        <button class="nav-btn"">Get Started</button>
    </div>

    <h1>Insights & Blogs</h1>

    <div class="btns">
        <button id="unique" class="filter-btn">All</button>
        <button class="filter-btn">Tech</button>
        <button class="filter-btn">SaaS</button>
        <button class="filter-btn">Marketing</button>
    </div>

    <div class="cards">
        <div class="card">
            <img class="card-img" src="./Assets/glass.webp" alt="glass">
            <button class="card-btn">Tech</button>
            <h3 class="card-content">The Ultimate Guide To SaaS Marketing</h3>
            <p class="card-date">May 23, 2025</p>
        </div>
        <div class="card">
            <img class="card-img" src="./Assets/chair.webp" alt="glass">
            <button class="card-btn">SaaS</button>
            <h3 class="card-content">5 Key Trends In SaaS Growth For 2025</h3>
            <p class="card-date">May 23, 2025</p>
        </div>
        <div class="card">
            <img class="card-img" src="./Assets/cat.webp" alt="glass">
            <button class="card-btn">Marketing</button>
            <h3 class="card-content">How Data-Driven Strategies Are Important</h3>
            <p class="card-date">May 23, 2025</p>
        </div>
        
    </div>
</body>
</html>
