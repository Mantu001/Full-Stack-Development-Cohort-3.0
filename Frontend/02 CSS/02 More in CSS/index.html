<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More in css</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- something in css -->
    <h1 id="dev">Mantu Kumar Tiwari</h1>
    <h1 id="hacker">Abhishek Kumar Sharma</h1>
    <h1 id="ml">Shivam Saurav</h1>

    <!-- #div - this is used to insert div with id box or whatever you write after # -->
    <div id="box">
        <div id="inner"></div>
    </div>

    <!-- Self testing span  -->
    <span id="block">
        <h2>this is span which is an inline element Self testing 😅</h2>
    </span>
    <button>Testing</button>

    <!-- Playing with position property -->
    <div id="box1">1</div>
    <div id="box2">2</div>
    <div id="box3">3</div>
</body>
</html>


<!-- 
    1. Three types of CSS :- Inline, Internal, External
    2. Class is used to assign multiple element of same group
    3. while ID is used to give to each element
-->
